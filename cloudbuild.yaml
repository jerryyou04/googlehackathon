steps:
  - name: "gcr.io/cloud-builders/docker"
    args:
      [
        "build",
        "-t",
        "gcr.io/$PROJECT_ID/github.com/jerryyou04/googlehackathon:$COMMIT_SHA",
        ".",
      ]

  - name: "gcr.io/cloud-builders/docker"
    args:
      [
        "push",
        "gcr.io/$PROJECT_ID/github.com/jerryyou04/googlehackathon:$COMMIT_SHA",
      ]

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      [
        "run",
        "deploy",
        "tdhackathon",
        "--image",
        "gcr.io/$PROJECT_ID/github.com/jerryyou04/googlehackathon:$COMMIT_SHA",
        "--region",
        "us-east4",
        "--platform",
        "managed",
        "--allow-unauthenticated",
      ]

images:
  - "gcr.io/$PROJECT_ID/github.com/jerryyou04/googlehackathon:$COMMIT_SHA"
